<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="favicon.ico">
    <title>Archon</title>
    <style>
        @font-face { font-family: C64; src: url('fonts/v2.0/C64_Pro-STYLE.woff2') format('woff2'); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#000; display:flex; align-items:center; justify-content:center;
            min-height:100vh; font-family:C64,monospace;
        }
        #frame {
            border:8px solid #3333aa; background:#0000aa;
            padding:44px 52px; text-align:center;
        }
        h1 { color:#fff; font-size:40px; letter-spacing:12px; margin-bottom:6px; text-shadow:4px 4px #000044; }
        .tagline { color:#aaaaff; font-size:12px; letter-spacing:3px; margin-bottom:36px; }
        .section-label { color:#ffff55; font-size:11px; letter-spacing:3px; margin:20px 0 8px; }
        .btn {
            display:block; width:320px; padding:16px 0; margin:8px auto;
            background:#000080; border:3px solid #8888ff;
            color:#fff; font-family:C64,monospace; font-size:15px;
            letter-spacing:3px; text-decoration:none; text-align:center; cursor:pointer;
            transition:background .1s, border-color .1s, color .1s;
        }
        .btn:hover { background:#2222aa; border-color:#fff; color:#ffff00; }
        .row { display:flex; gap:8px; justify-content:center; margin:4px 0; }
        .btn-sm {
            flex:1; max-width:100px; padding:14px 0;
            background:#000080; border:3px solid #8888ff;
            color:#aaaaff; font-family:C64,monospace; font-size:12px;
            letter-spacing:2px; text-decoration:none; text-align:center; cursor:pointer;
            transition:background .1s, border-color .1s, color .1s;
        }
        .btn-sm:hover { background:#2222aa; border-color:#fff; color:#ffff00; }
        .hint { color:#5555cc; font-size:10px; letter-spacing:2px; margin-top:28px; }
        .divider { border:none; border-top:1px solid #222288; margin:20px 0; }
    </style>
</head>
<body>
    <div id="frame">
        <h1>ARCHON</h1>
        <div class="tagline">THE LIGHT AND THE DARK</div>

        <div class="section-label">&#x25BA; SINGLE PLAYER</div>
        <div class="row">
            <a class="btn-sm" href="singleplayer.html?d=1">EASY</a>
            <a class="btn-sm" href="singleplayer.html?d=2">NORMAL</a>
            <a class="btn-sm" href="singleplayer.html?d=3">HARD</a>
        </div>

        <hr class="divider">

        <div class="section-label">&#x25BA; MULTIPLAYER</div>
        <a class="btn" href="multiplayer.html">LAN / VPN</a>

        <div class="hint">single player: you are light &bull; arrows + enter</div>
        <div class="hint">esc during game &rarr; back to this screen</div>
    </div>
</body>
</html>
