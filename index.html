<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="favicon.ico">
    <title>Archon</title>
    <style>
        @font-face { font-family: C64; src: url('fonts/v2.0/C64_Pro-STYLE.woff2') format('woff2'); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            font-family: C64, monospace;
        }
        #frame {
            border: 8px solid #3333aa;
            background: #0000aa;
            padding: 48px 56px;
            text-align: center;
            image-rendering: pixelated;
        }
        h1 {
            color: #fff;
            font-size: 40px;
            letter-spacing: 12px;
            margin-bottom: 8px;
            text-shadow: 4px 4px #000044;
        }
        .sub {
            color: #aaaaff;
            font-size: 13px;
            letter-spacing: 3px;
            margin-bottom: 48px;
        }
        .btn {
            display: block;
            width: 320px;
            padding: 18px 0;
            margin: 14px auto;
            background: #000080;
            border: 3px solid #8888ff;
            color: #ffffff;
            font-family: C64, monospace;
            font-size: 16px;
            letter-spacing: 4px;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: background 0.1s, border-color 0.1s;
        }
        .btn:hover {
            background: #3333cc;
            border-color: #ffffff;
            color: #ffff00;
        }
        .hint {
            color: #5555cc;
            font-size: 11px;
            letter-spacing: 2px;
            margin-top: 36px;
        }
    </style>
</head>
<body>
    <div id="frame">
        <h1>ARCHON</h1>
        <div class="sub">THE LIGHT AND THE DARK</div>
        <a class="btn" href="singleplayer.html">&#x25BA; SINGLE PLAYER</a>
        <a class="btn" href="multiplayer.html">&#x25BA; MULTIPLAYER</a>
        <div class="hint">single player: you are light &#x2022; arrows + enter</div>
        <div class="hint">multiplayer: two players via local network / vpn</div>
    </div>
</body>
</html>
