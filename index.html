<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/v1.0/archon.css">
    <link rel="shortcut icon" href="favicon.ico">
    <title>Archon</title>
</head>

<body data-sid="e9009579410123658bf0cb91a4f095e6">
    <div id="body">
        <div id="border"><canvas id="screen" width="960" height="600" class="hide" moz-opaque></canvas><input type="text" id="onlineLink" class="hide" readonly="readonly" value=""><canvas id="visualFilterLayer" width="960" height="600"></canvas></div>
        <div id="menuOverlay" class="hide"></div>
        <div id="menuToggler" class="hide"><span>Menu</span></div>
        <div id="menu">
            <div class="l1 back nosubmenu">&lt; Close</div>
            <div id="disconnect" class="l1 startButton nosubmenu hide">Disconnect</div>
            <div id="toggleFullscreen" class="l1 nosubmenu">Fullscreen</div>
            <div class="l1">Visual filter
                <div id="visualFilterSelect" class="items closed">
                    <div data-value="none">none</div>
                    <div data-value="scanlines">Scan lines</div>
                    <div data-value="bwTv">black and white TV</div>
                    <div data-value="colorTv">color TV</div>
                    <div data-value="greenC64monitor">green C64 monitor</div>
                </div>
            </div>
            <div class="l1">Sounds
                <div id="soundSelect" class="items closed">
                    <div data-value="on">on</div>
                    <div data-value="off">off</div>
                </div>
            </div>
            <div id="ctrlOnline" class="l1 hide">Control
                <div id="onlineControlSelect" class="items closed">
                    <div data-value="keyboard">arrows + enter</div>
                    <div data-value="gamepad">gamepad</div>
                </div>
            </div>
            <div id="ctrlLight" class="l1">Light side Control
                <div id="lightControlSelect" class="items closed">
                    <div data-value="keyboardArrows">arrows + enter</div>
                    <div data-value="keyboardWasd">wasd + left shift</div>
                    <div data-value="gamepad">gamepad</div>
                </div>
            </div>
            <div id="ctrlDark" class="l1">Dark side Control
                <div id="darkControlSelect" class="items closed">
                    <div data-value="keyboardArrows">arrows + enter</div>
                    <div data-value="keyboardWasd">wasd + left shift</div>
                    <div data-value="gamepad">gamepad</div>
                </div>
            </div>
        </div>
    </div><img src="images/v1.0/noise.png" id="crtNoise" class="hide"><img src="images/v1.0/noiseColor.png" id="crtNoiseColor" class="hide">
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/v1.3/archon.js"></script>
</body>

</html>
