<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<link rel="shortcut icon" href="/favicon.ico">
	<meta name="robots" content="noindex,nofollow">
	<title>Unsupported browser</title>

	<style type="text/css">
		@font-face {
			font-family: 'C64ProRegular';
			src: url('/fonts/v1.0/c64_pro_v1.0-style-webfont-webfont.eot');
			src: url('/fonts/v1.0/c64_pro_v1.0-style-webfont-webfont.eot?#iefix') format('embedded-opentype'),
				url('/fonts/v1.0/c64_pro_v1.0-style-webfont-webfont.woff') format('woff'),
				url('/fonts/v1.0/c64_pro_v1.0-style-webfont-webfont.ttf') format('truetype');
			font-weight: normal;
			font-style: normal;
		}
		html,
		body {
			position: relative;
			margin: 2vh 0px 0px 0px;
			padding: 0px;
			height: 100%;
			min-height: 100%;
			background: #000;
			overflow: hidden;
			font-family: 'C64ProRegular';
			text-transform: uppercase;
			text-align: center;
		}
		p {
			line-height: 32px;
			font-size: 24px;
			letter-spacing: 3px;
			color: #fff;
		}
		a {
			padding: 2px;
			color: #000;
			background: #fff;
			text-decoration: none;
			cursor: pointer;
		}
	</style>
</head>
<body>
	<img src="http://archon.krissz.hu/images/v1.0/archon-icon.jpg">
	<p>
		Unsupported browser<br>
		<br>
		Please upgrade your browser<br>
		to latest version of <a href="http://www.google.com/chrome/" target="chrome">Chrome</a>
		or <a href="https://www.mozilla.org/firefox/" target="firefox">FireFox</a> !
	</p>
</body>
</html>
